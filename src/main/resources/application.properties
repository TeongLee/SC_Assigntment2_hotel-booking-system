spring.application.name=hotelbooking

# In-memory H2 database — zero-config, recreated fresh on each startup.
spring.datasource.url=jdbc:h2:mem:hoteldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Browse the data at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:hoteldb).
spring.h2.console.enabled=true
spring.jpa.show-sql=true
